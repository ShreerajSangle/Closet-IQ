kind = "web"
previewPath = "/"
title = "ClosetIQ"
version = "1.0.0"
id = "artifacts/closetiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25992

[services.development]
run = "pnpm --filter @workspace/closetiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/closetiq", "run", "build" ]
publicDir = "artifacts/closetiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25992"
BASE_PATH = "/"
